name: EAS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ota-update:
    name: Send OTA Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      npm_config_user_agent: pnpm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send OTA Update (Production)
        if: github.event_name == 'push'
        run: |
          eas update --branch production --message "Production update from commit ${{ github.sha }}"

      - name: Send OTA Update (Preview)
        if: github.event_name == 'pull_request'
        id: ota-update
        run: |
          OUTPUT=$(eas update --branch preview --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" --json)
          UPDATE_ID=$(echo "$OUTPUT" | jq -r '.[] | select(.platform != null) | .id' | head -n 1)
          echo "update-id=$UPDATE_ID" >> $GITHUB_OUTPUT

      - name: Comment PR with EAS Dashboard Link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const updateId = '${{ steps.ota-update.outputs.update-id }}';
            const dashboardUrl = updateId
              ? `https://expo.dev/accounts/dleanjeans/projects/lyricsionary/updates/${updateId}`
              : `https://expo.dev/accounts/dleanjeans/projects/lyricsionary/updates`;
            const comment = `### 🚀 OTA Update Sent

            Preview update has been sent to the \`preview\` channel!

            **[View Update on EAS Dashboard](${dashboardUrl})**`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    env:
      npm_config_user_agent: pnpm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          cache: 'pnpm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build APK locally
        run: eas build --platform android --profile preview --local --non-interactive --output ./lyricsionary.apk

      - name: Upload APK artifact
        if: github.event_name == 'pull_request'
        id: upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: lyricsionary-apk
          path: ./lyricsionary.apk

      - name: Comment PR with APK download link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 📦 APK Build Ready\n\n**[Download APK](${{ steps.upload-artifact.outputs.artifact-url }})**`
            });

      - name: Get version from package.json
        if: github.event_name != 'pull_request'
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.package-version.outputs.version }}-build.${{ github.run_number }}
          name: Release v${{ steps.package-version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Android APK Release

            **Version:** ${{ steps.package-version.outputs.version }}
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Changes
            ${{ github.event.head_commit.message }}

            Download the APK below to install on Android devices.
          files: ./lyricsionary.apk
          draft: false
          prerelease: false
