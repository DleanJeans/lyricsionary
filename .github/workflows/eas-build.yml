name: EAS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ota-update:
    name: Send OTA Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      npm_config_user_agent: pnpm
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Send OTA Update (Production)
        if: github.event_name == 'push'
        run: |
          eas update --branch production --message "Production update from commit ${{ github.sha }}"

      - name: Send OTA Update (Preview)
        if: github.event_name == 'pull_request'
        id: ota-update
        run: |
          OUTPUT=$(eas update --branch preview --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" --json)
          UPDATE_ID=$(echo "$OUTPUT" | jq -r '.[] | select(.platform != null) | .id' | head -n 1)
          echo "update-id=$UPDATE_ID" >> $GITHUB_OUTPUT

      - name: Comment PR with EAS Dashboard Link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const updateId = '${{ steps.ota-update.outputs.update-id }}';
            const dashboardUrl = updateId
              ? `https://expo.dev/accounts/dleanjeans/projects/lyricsionary/updates/${updateId}`
              : `https://expo.dev/accounts/dleanjeans/projects/lyricsionary/updates`;
            const comment = `### 🚀 OTA Update sent to [EAS Dashboard](${dashboardUrl})!`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  check-build-apk:
    name: Check [build-apk]
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      commit-message: ${{ steps.check.outputs.commit-message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check commit message for [build-apk]
        id: check
        run: |
          MSG=$(git log -1 --pretty=%B ${{ github.event.after }})
          echo "Commit message: $MSG"
          echo "commit-message=$MSG" >> $GITHUB_OUTPUT
          if echo "$MSG" | grep -q '\[build-apk\]'; then
            echo "should-build=true" >> $GITHUB_OUTPUT
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
          fi

  build-apk:
    name: Build APK
    needs: check-build-apk
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && needs.check-build-apk.outputs.should-build == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    env:
      npm_config_user_agent: pnpm
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build APK locally
        run: eas build --platform android --profile preview --local --non-interactive --output ./lyricsionary.apk

      - name: Upload APK artifact
        if: github.event_name == 'pull_request'
        id: upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: lyricsionary-apk
          path: ./lyricsionary.apk

      - name: Comment PR with APK download link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 📦 [APK Ready!](${{ steps.upload-artifact.outputs.artifact-url }})\nCommit: \`${{ needs.check-build-apk.outputs.commit-message }}\``
            });

      - name: Get version from package.json
        if: github.event_name != 'pull_request'
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.package-version.outputs.version }}-build.${{ github.run_number }}
          name: Release v${{ steps.package-version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Android APK Release

            **Version:** ${{ steps.package-version.outputs.version }}
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Changes
            ${{ github.event.head_commit.message }}

            Download the APK below to install on Android devices.
          files: ./lyricsionary.apk
          draft: false
          prerelease: false
